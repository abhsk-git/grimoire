<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% if post %}Edit — {{ post.title }}{% else %}New Post{% endif %} — Grimoire</title>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg?v=3">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600&family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/style.css?v=3">
<link rel="stylesheet" href="/static/css/blog.css?v=3">
<script>(function(){var t=localStorage.getItem('lv-theme')||'geek';document.documentElement.setAttribute('data-theme',t);})();</script>
<!-- Editor.js core + tools -->
<script src="https://cdn.jsdelivr.net/npm/@editorjs/editorjs@latest/dist/editorjs.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@editorjs/header@latest/dist/header.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@editorjs/list@latest/dist/list.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@editorjs/quote@latest/dist/quote.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@editorjs/code@latest/dist/code.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@editorjs/image@latest/dist/image.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@editorjs/embed@latest/dist/embed.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@editorjs/table@latest/dist/table.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@editorjs/delimiter@latest/dist/delimiter.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@editorjs/inline-code@latest/dist/inline-code.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@editorjs/marker@latest/dist/marker.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@editorjs/checklist@latest/dist/checklist.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@editorjs/underline@latest/dist/underline.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@editorjs/warning@latest/dist/warning.umd.min.js"></script>
</head>
<body class="editor-page">

<!-- Top bar -->
<div class="editor-topbar">
  <a href="/dashboard" class="editor-back">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
    Dashboard
  </a>
  <span class="editor-logo-sep">·</span>
  <span style="font-size:13px;font-weight:600;color:var(--text2)" id="editingLabel">{% if post %}Editing{% else %}New Post{% endif %}</span>
  <span class="save-status" id="saveStatus">Draft</span>
  <div class="editor-topbar-right">
    <label class="btn-upload-img" title="Upload image into post">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      Upload Image
      <input type="file" accept="image/*" id="topbarImageInput" style="display:none" onchange="topbarUploadImage(this)">
    </label>
    <button class="btn-settings" onclick="toggleSettings()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      Settings
    </button>
    <button class="btn-settings" onclick="saveDraft()" id="draftBtn" style="padding:9px 16px">Save Draft</button>
    <button class="btn-publish" id="publishBtn" onclick="togglePublish()">
      {% if post and post.status == 'published' %}Unpublish{% else %}Publish{% endif %}
    </button>
  </div>
</div>

<!-- Main editor canvas -->
<main class="editor-main">

  <!-- Cover image zone -->
  <label class="editor-cover-zone" id="coverZone" for="coverFileInput">
    <input type="file" id="coverFileInput" accept="image/*" style="display:none" onchange="handleCoverFile(this)">
    <div class="cover-placeholder" id="coverPlaceholder">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      <span>Add cover image</span>
    </div>
    <img id="coverPreviewImg" style="display:none;width:100%;height:100%;object-fit:cover" src="" alt="">
    <button class="cover-remove-btn" onclick="removeCover(event)">Remove</button>
  </label>

  <!-- Title -->
  <textarea class="editor-title-input" id="postTitle" placeholder="Post title…" rows="1"
    oninput="autoResizeTextarea(this); syncSlug(); scheduleAutosave()">{% if post %}{{ post.title }}{% endif %}</textarea>

  <!-- Stats row -->
  <div class="editor-stats-row">
    <span id="wordCountDisplay">0 words</span>
    <span>·</span>
    <span id="readTimeDisplay">1 min read</span>
  </div>

  <!-- Editor.js -->
  <div id="editorjs"></div>
</main>

<!-- Settings overlay + panel -->
<div class="settings-overlay" id="settingsOverlay" onclick="toggleSettings()"></div>
<aside class="settings-panel" id="settingsPanel">
  <div class="settings-panel-header">
    <span class="settings-panel-title">Post Settings</span>
    <button class="settings-close" onclick="toggleSettings()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div class="settings-body">

    <div class="settings-group">
      <label>Status</label>
      <div class="settings-status">
        <div class="settings-status-dot {% if post and post.status == 'published' %}published{% else %}draft{% endif %}" id="statusDot"></div>
        <span class="settings-status-text" id="statusText">{% if post and post.status == 'published' %}Published{% else %}Draft{% endif %}</span>
      </div>
    </div>

    <div class="settings-group">
      <label>URL Slug</label>
      <input type="text" id="postSlug" placeholder="my-post-title"
        value="{% if post %}{{ post.slug }}{% endif %}">
    </div>

    <div class="settings-group">
      <label>Tags <span style="font-weight:400;text-transform:none;letter-spacing:0">(comma-separated)</span></label>
      <input type="text" id="postTags" placeholder="web, design, tutorial"
        value="{% if post %}{{ post.tags }}{% endif %}">
    </div>

    <div class="settings-group">
      <label>Excerpt</label>
      <textarea id="postExcerpt" placeholder="Short description shown in cards…">{% if post %}{{ post.excerpt }}{% endif %}</textarea>
    </div>

    <div class="settings-group">
      <label>Cover Image URL</label>
      <input type="url" id="coverUrlInput" placeholder="https://example.com/image.jpg"
        value="{% if post %}{{ post.cover_image }}{% endif %}" oninput="previewCoverFromUrl(this.value)">
      <img class="cover-preview" id="coverUrlPreview" src="" alt="">
      <button class="settings-apply-btn" onclick="applyCoverUrl()">Apply Cover</button>
    </div>

    <div class="settings-group" style="margin-top:auto">
      <button class="settings-danger-btn" onclick="deletePost()">
        Delete post
      </button>
    </div>

  </div>
</aside>

<div class="toast hidden" id="toast"></div>

<script>
// ── Bootstrap data from server ───────────────────────────────────────────────
const POST_ID   = {{ post.id if post else 'null' }};
const POST_DATA = {{ post.content | tojson if post and post.content else 'null' }};
const POST_STATUS = '{{ post.status if post else "draft" }}';
</script>
<script src="/static/js/theme.js?v=3"></script>
<script src="/static/js/blog_editor.js?v=3"></script>
</body>
</html>
