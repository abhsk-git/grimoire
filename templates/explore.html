<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Explore — LinkVault</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/style.css">
<link rel="stylesheet" href="/static/css/explore.css">
<script>(function(){var t=localStorage.getItem('lv-theme')||'geek';document.documentElement.setAttribute('data-theme',t);})();</script>
</head>
<body class="explore-body">

<header class="explore-header">
  <div class="explore-nav">
    <a href="/" class="logo">
      <svg width="24" height="24" viewBox="0 0 28 28" fill="none"><rect width="28" height="28" rx="8" fill="#6366f1"/><path d="M8 14h12M14 8l6 6-6 6" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span>LinkVault</span>
    </a>
    <div class="explore-search-wrap">
      <span class="search-icon"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
      <input type="text" id="exploreSearch" placeholder="Search public links…" oninput="onExploreSearch(this.value)">
    </div>
    <div id="exploreNavAuth">
      <a href="/dashboard" class="btn-primary">My Dashboard</a>
    </div>
    <div class="theme-switcher">
      <button class="theme-toggle" onclick="toggleThemePicker()" title="Switch theme">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
      </button>
      <div class="theme-picker hidden" id="themePicker">
        <div class="theme-picker-title">Theme</div>
        <div class="theme-option" data-theme="light" onclick="applyTheme('light')">
          <span class="theme-swatch" style="background:linear-gradient(135deg,#f7f8fc 50%,#4f46e5 50%)"></span>
          <span>Light</span><span class="theme-check"></span>
        </div>
        <div class="theme-option" data-theme="dark" onclick="applyTheme('dark')">
          <span class="theme-swatch" style="background:linear-gradient(135deg,#07070e 50%,#6366f1 50%)"></span>
          <span>Dark</span><span class="theme-check"></span>
        </div>
        <div class="theme-option" data-theme="geek" onclick="applyTheme('geek')">
          <span class="theme-swatch" style="background:linear-gradient(135deg,#f4f7f2 50%,#2f8d46 50%)"></span>
          <span>Geek</span><span class="theme-check"></span>
        </div>
        <div class="theme-option" data-theme="midnight" onclick="applyTheme('midnight')">
          <span class="theme-swatch" style="background:linear-gradient(135deg,#020c18 50%,#00d4c0 50%)"></span>
          <span>Midnight</span><span class="theme-check"></span>
        </div>
      </div>
    </div>
  </div>
</header>

<div class="explore-hero">
  <h1>Discover public links</h1>
  <p>Resources, tools, and articles shared by the community</p>
  <div class="explore-counts">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
    <span id="exploreTotal">—</span> links shared publicly
  </div>
</div>

<div class="trending-tags-wrap">
  <div class="trending-label">Trending tags</div>
  <div id="trendingTags" class="trending-tags"></div>
</div>

<div class="explore-content">
  <div id="exploreGrid" class="links-grid explore-grid"></div>
  <div id="exploreEmpty" class="empty-state hidden">
    <div class="empty-icon">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
    </div>
    <h3>No public links yet</h3>
    <p>Be the first to share something with the community</p>
    <a href="/" class="btn-primary">Add your links</a>
  </div>
  <div id="exploreLoadMore" class="load-more-wrap hidden">
    <button class="btn-ghost" onclick="exploreLoadMore()">Load more</button>
  </div>
</div>

<div class="toast hidden" id="toast"></div>

<script src="/static/js/theme.js"></script>
<script src="/static/js/explore.js"></script>
</body>
</html>
